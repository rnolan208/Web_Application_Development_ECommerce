<!DOCTYPE html>
<html>

<head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />

        <title>Checkout</title>

        <!--Importing Bootstrap for CSS-->
        <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
        <!--Linking CSS file-->
        <link rel="stylesheet" href="./css/style.css">

        <!--Font Awesome-->
        <script src="https://kit.fontawesome.com/8875caf3cf.js" crossorigin="anonymous"></script>

    </head>
    <body>
        <div class="container">
            <h1>Checkout</h1>
            <!--Cart itmes-->
            <h2 id="cart_items"></h2>
            <h2 id="final_price"></h2>

            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="text" id="email" name="email" required>

                <label for="address">Address:</label>
                <textarea type="text" id="address" name="address" required></textarea>

                <label for="payment">Payment Method:</label>
                <select id="payment" name="payment">
                    <option value="credit-card">Credit Card</option>
                    <option value="paypal">Paypal</option>
                    <option value="stripe">Stripe</option>
                    <option value="crypto">Cryptocurrency</option>
                </select>

                <button type="submit">Place Order</button>
                <a href="home.html">Continue Shopping</a>
            </form>
        </div>
    </body>

</html>

<script>
    //store cost of all items
    let cost_allItems = 0;


    for(i = 0; i <localStorage.length; i++) {
        let product = JSON.parse(localStorage.key(i));
        //console.log(product);
        let content = JSON.parse(localStorage.getItem(product));

        let total_cost = content.quan * content.p;
        cost_allItems += total_cost;

        //console.log(content);
        if(content.quan > 0) {
            document.getElementById("cart_items").innerHTML += product + " x " + content.quan + " = " + total_cost + "<br>";
        }
        document.getElementById("final_price").innerHTML = cost_allItems;
    }


</script>
